{% extends "base.html" %}

{% block title %}Register{% endblock %}
{% block header_title %}Create Account{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--header-height) - 100px); margin: 2rem 0;">
    <div class="card" style="width: 100%; max-width: 480px; padding: 2.5rem 2rem;">
        
        <!-- Logo Header -->
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem;">
            <div id="auth-logo" class="auth-logo-anim" style="width: 60px; height: 60px; border-radius: 50%; background: var(--accent-light); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; color: var(--accent-color); transition: all 0.4s ease; box-shadow: var(--shadow-sm);">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <span style="font-family: var(--font-heading); font-size: 1.25rem; font-weight: 800; color: var(--text-primary); margin-top: 0.5rem; letter-spacing: -0.02em;">CodeWithPapaRao</span>
        </div>

        <h2 style="text-align: center; margin-bottom: 0.5rem; font-family: var(--font-heading);">Create an account</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.875rem;">
            Join us and start learning today
        </p>

        <form id="register-form" action="{{ url_for('auth.register') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="first_name" class="form-label">First name</label>
                    <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="last_name" class="form-label">Last name</label>
                    <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe">
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@domain.com" required>
            </div>

            <div class="form-group">
                <label for="role" class="form-label">Account Role</label>
                <select id="role" name="role" class="form-control" style="appearance: auto;">
                    <option value="student">Student</option>
                    <option value="admin">Instructor / Admin</option>
                    <option value="super_admin">Platform Super Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>

            <button id="submit-btn" type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease;">
                <span>Register</span>
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in instead</a>
        </div>
    </div>
</div>

<style>
    @keyframes logo-intro {
        0% { transform: scale(0.5) rotate(-45deg); opacity: 0; }
        100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .auth-logo-anim {
        animation: logo-intro 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    /* Button loading styles */
    .submitting-btn {
        position: relative;
        overflow: hidden;
        pointer-events: none;
        opacity: 0.9;
    }
    .submitting-btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.35),
            transparent
        );
        animation: btn-shimmer 1.2s infinite;
    }
    @keyframes btn-shimmer {
        100% { left: 100%; }
    }
</style>

<script>
    document.getElementById('register-form').addEventListener('submit', function() {
        const btn = document.getElementById('submit-btn');
        btn.classList.add('submitting-btn');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Registering...</span>';
    });
</script>
{% endblock %}
