{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block header_title %}Sign In{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--header-height) - 100px);">
    <div class="card" style="width: 100%; max-width: 420px; padding: 2.5rem 2rem;">
        
        <!-- Logo Header -->
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem;">
            <div id="auth-logo" class="auth-logo-anim" style="width: 60px; height: 60px; border-radius: 50%; background: var(--accent-light); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.75rem; color: var(--accent-color); transition: all 0.4s ease; box-shadow: var(--shadow-sm);">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <span style="font-family: var(--font-heading); font-size: 1.25rem; font-weight: 800; color: var(--text-primary); margin-top: 0.5rem; letter-spacing: -0.02em;">CodeWithPapaRao</span>
        </div>

        <h2 style="text-align: center; margin-bottom: 0.5rem; font-family: var(--font-heading);">Welcome back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.875rem;">
            Sign in to continue your learning journey
        </p>

        <form id="login-form" action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email" class="form-label">Email address or Username</label>
                <input type="text" id="email" name="email" class="form-control" placeholder="name@domain.com or admin" required autocomplete="email">
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.375rem;">
                    <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="{{ url_for('auth.reset_password') }}" style="font-size: 0.75rem;">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button id="submit-btn" type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease;">
                <span>Sign In</span>
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </div>
    </div>
</div>

<style>
    @keyframes logo-intro {
        0% { transform: scale(0.5) rotate(-45deg); opacity: 0; }
        100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .auth-logo-anim {
        animation: logo-intro 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    /* Button loading styles */
    .submitting-btn {
        position: relative;
        overflow: hidden;
        pointer-events: none;
        opacity: 0.9;
    }
    .submitting-btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.35),
            transparent
        );
        animation: btn-shimmer 1.2s infinite;
    }
    @keyframes btn-shimmer {
        100% { left: 100%; }
    }
</style>

<script>
    document.getElementById('login-form').addEventListener('submit', function() {
        const btn = document.getElementById('submit-btn');
        btn.classList.add('submitting-btn');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Signing In...</span>';
    });
</script>
{% endblock %}
