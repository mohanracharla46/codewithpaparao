{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block header_title %}Sign In{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--header-height) - 100px);">
    <div class="card" style="width: 100%; max-width: 420px; padding: 2rem;">
        <h2 style="text-align: center; margin-bottom: 0.5rem; font-family: var(--font-heading);">Welcome back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.875rem;">
            Sign in to continue your learning journey
        </p>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email" class="form-label">Email address or Username</label>
                <input type="text" id="email" name="email" class="form-control" placeholder="name@domain.com or admin" required autocomplete="email">
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.375rem;">
                    <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="{{ url_for('auth.reset_password') }}" style="font-size: 0.75rem;">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
