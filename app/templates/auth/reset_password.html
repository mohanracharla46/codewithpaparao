{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}
{% block header_title %}Reset Password{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--header-height) - 100px);">
    <div class="card" style="width: 100%; max-width: 420px; padding: 2rem;">
        <h2 style="text-align: center; margin-bottom: 0.5rem; font-family: var(--font-heading);">Reset your password</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.875rem;">
            Enter your email address and we'll send you a link to reset your password.
        </p>

        <form action="{{ url_for('auth.reset_password') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@domain.com" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                Send Reset Link
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Remember password? <a href="{{ url_for('auth.login') }}">Back to sign in</a>
        </div>
    </div>
</div>
{% endblock %}
